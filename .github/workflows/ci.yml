name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests + Lint syntax
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check all JS files
        run: |
          for f in $(find src evals tests -name '*.js'); do
            node --check "$f" || exit 1
          done

      - name: Run unit tests
        run: npm test

      - name: Run eval suite (no LLM)
        run: npm run eval:no-llm

      - name: Verify summary.json was produced
        run: |
          test -f evals/runs/summary.json
          node -e "const s=require('./evals/runs/summary.json'); console.log('Eval ran on', s.lines_total, 'lines across', s.fixtures, 'fixtures')"
